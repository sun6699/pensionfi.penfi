<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Task Manager - Engr Sunday Ebikoro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #333;
    }

    /* TOP GRAPHIC SPACE */
    .banner {
      height: 180px;
      background: url('https://via.placeholder.com/1200x180') center/cover no-repeat;
    }

    .container {
      display: flex;
      max-width: 1000px;
      margin: 20px auto;
      gap: 20px;
      padding: 0 15px;
    }

    /* SIDE GRAPHIC SPACE */
    .side-graphic {
      width: 30%;
      background: white;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .side-graphic img {
      max-width: 100%;
      border-radius: 10px;
    }

    /* MAIN CARD */
    .card {
      width: 70%;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 5px;
    }

    p {
      color: #555;
      font-size: 14px;
    }

    input {
      width: 65%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      background: #007bff;
      color: white;
      margin-left: 5px;
    }

    ul {
      padding: 0;
    }

    li {
      list-style: none;
      display: flex;
      justify-content: space-between;
      padding: 8px;
      background: #eee;
      margin-top: 5px;
      border-radius: 5px;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }

    /* MOBILE RESPONSIVE */
    @media(max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .side-graphic,
      .card {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- TOP GRAPHIC -->
  <div class="banner"></div>

  <div class="container">

    <!-- SIDE GRAPHIC -->
    <div class="side-graphic">
      <img src="https://via.placeholder.com/300x400" alt="Graphic Space">
    </div>

    <!-- MAIN APP -->
    <div class="card">
      <h1>Task Manager</h1>

      <p>
        My name is <b>Engr Sunday Ebikoro</b>, a DevOps Engineer.  
        I built this Task Manager app using <b>Node.js, SQLite, and Docker</b>, 
        deployed online via <b>Render</b> with automated <b>GitHub CI/CD</b>.  
        This app supports full CRUD operations on tasks.
      </p>

      <input type="text" id="taskInput" placeholder="Enter task" />
      <button onclick="addTask()">Add Task</button>

      <ul id="taskList"></ul>
    </div>

  </div>

  <script>
    const API = "https://task-manager-app-zk2p.onrender.com/tasks";

    async function loadTasks() {
      try {
        const res = await fetch(API);
        const tasks = await res.json();

        const list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach(task => {
          const li = document.createElement("li");
          li.innerHTML = `
            ${task.title}
            <button class="delete" onclick="deleteTask(${task.id})">❌</button>
          `;
          list.appendChild(li);
        });
      } catch (err) {
        console.error("Failed to load tasks:", err);
      }
    }

    async function addTask() {
      const input = document.getElementById("taskInput");
      const title = input.value.trim();
      if (!title) return;

      try {
        await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title })
        });

        input.value = "";
        loadTasks();
      } catch (err) {
        console.error("Failed to add task:", err);
      }
    }

    async function deleteTask(id) {
      try {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        loadTasks();
      } catch (err) {
        console.error("Failed to delete task:", err);
      }
    }

    loadTasks();
  </script>

</body>
</html>
